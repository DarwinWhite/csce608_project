<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Gallery — Staff</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav>
  <a class="brand" href="/index.html">🖼 Meridian Gallery</a>
  <a href="/index.html">Browse</a>
  <a href="/staff.html">Staff</a>
  <a href="/management.html">Management</a>
</nav>

<div id="toast-container"></div>

<div class="page">
  <h1 class="section-title" style="margin-top:0">Staff Portal</h1>

  <!-- Staff selector -->
  <div class="form-card">
    <h3>Select Staff Member</h3>
    <div class="form-grid">
      <div class="form-group">
        <label for="staff-select">Active Staff Member</label>
        <select id="staff-select">
          <option value="">— choose —</option>
        </select>
      </div>
    </div>
    <div id="staff-info" class="text-muted"></div>
  </div>

  <!-- Handled Artwork -->
  <h2 class="section-title">My Handled Artwork</h2>
  <div id="handles-area">
    <p class="text-muted">Select a staff member above to see their assignments.</p>
  </div>

  <!-- Assign Artwork form -->
  <div class="form-card">
    <h3>Assign an Artwork to Me</h3>
    <div class="form-grid">
      <div class="form-group">
        <label for="assign-artwork-id">Artwork ID</label>
        <input type="number" id="assign-artwork-id" min="1" placeholder="e.g. 142">
      </div>
    </div>
    <button class="btn btn-primary" onclick="assignArtwork()">Assign</button>
  </div>

  <!-- Add new artwork form -->
  <div class="form-card">
    <h3>Add New Artwork to Gallery</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="new-title" placeholder="Painting title">
      </div>
      <div class="form-group">
        <label>Year Made</label>
        <input type="number" id="new-year" min="1000" max="2025" placeholder="e.g. 1998">
      </div>
      <div class="form-group">
        <label>Style</label>
        <select id="new-style"></select>
      </div>
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" id="new-price" min="1" step="0.01" placeholder="e.g. 4500">
      </div>
      <div class="form-group">
        <label>Artist</label>
        <select id="new-artist-id"></select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addArtwork()">Add Artwork</button>
  </div>

  <!-- Customer lookup -->
  <h2 class="section-title">Customer Lookup</h2>
  <div class="filter-bar">
    <label>Search
      <input type="text" id="cust-search" placeholder="Name or e-mail…" oninput="loadCustomers(1)">
    </label>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Spent</th>
        </tr>
      </thead>
      <tbody id="cust-tbody"></tbody>
    </table>
  </div>
  <div class="pagination" id="cust-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/staff.js"></script>
</body>
</html>
