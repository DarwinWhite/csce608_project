services:
  db:
    image: postgres:15
    container_name: gallery_db
    environment:
      POSTGRES_DB: artgallery
      POSTGRES_USER: gallery_user
      POSTGRES_PASSWORD: gallery_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gallery_user -d artgallery"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: gallery_backend
    environment:
      DATABASE_URL: postgresql://gallery_user:gallery_pass@db:5432/artgallery
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
